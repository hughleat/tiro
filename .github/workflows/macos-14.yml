name: macOS 14 acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-14-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: Apple Silicon macOS 14
    runs-on: macos-14
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - name: Check out Tiro
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install release tools
        run: brew install ripgrep

      - name: Verify Swift 6 toolchain
        run: swift --version | grep -q 'Swift version 6\.'

      - name: Run complete acceptance suite
        run: ./scripts/test_all.sh

      - name: Retain tested DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Tiro-macOS-arm64
          path: |
            dist/releases/*.dmg
            dist/releases/*.dmg.sha256
          if-no-files-found: error
          retention-days: 7
