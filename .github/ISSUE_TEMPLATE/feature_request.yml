name: Feature request
description: Suggest a focused improvement to Tiro
title: "[Feature]: "
body:
  - type: textarea
    id: need
    attributes:
      label: What would this help you do?
      description: Describe the workflow or problem rather than only the proposed control.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like Tiro to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: What do you do today?
